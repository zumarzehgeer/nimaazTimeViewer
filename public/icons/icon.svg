  <!-- Dome -->
  <path d="M176,360 Q176,280 256,270 Q336,280 336,360 Z" fill="#11999e"/>

  <!-- Door arch -->
  <path d="M232,420 L232,385 Q232,368 256,368 Q280,368 280,385 L280,420 Z" fill="#0f172a" opacity="0.7"/>

  <!-- Star on dome peak -->
